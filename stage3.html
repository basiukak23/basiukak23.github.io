<!doctype html>
<html lang="uk">
<head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Детектив SQL: Етап 3</title>
    <script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden flex flex-col md:flex-row">
    <nav class="bg-white w-full md:w-64 border-r border-slate-200 flex flex-col h-full shadow-sm">
        <div class="p-4 border-b bg-slate-100 flex items-center gap-2"><h1 class="font-bold text-lg">Детектив SQL</h1></div>
        <div class="flex flex-col p-2 gap-1" id="nav-menu">
            <button onclick="window.location.href='index.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm">Брифінг</button>
            <button onclick="window.location.href='roles.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm">Досьє</button>
            <button onclick="window.location.href='tasks.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm">План</button>
            <button onclick="window.location.href='criteria.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm">Оцінювання</button>
            <button onclick="window.location.href='sources.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm">Джерела</button>
            <div class="border-t my-2"></div>
            <button onclick="window.location.href='stage1.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm">Етап 1</button>
            <button id="nav-stage2" class="nav-link text-left px-4 py-3 rounded-md text-sm">Етап 2</button>
            <button id="nav-stage3" class="nav-link text-left px-4 py-3 rounded-md text-sm">Етап 3</button>
        </div>
    </nav>
    <main class="flex-1 overflow-y-auto p-8">
        <h2 class="text-3xl font-bold mb-4 border-b pb-2">Етап 3: Фінал</h2>
        <div class="bg-slate-900 rounded-t-lg p-4 font-mono text-green-400 text-sm">> Отримано ПРЯМИЙ ДОСТУП до таблиці 'transactions'.</div>
        <div class="bg-white p-6 rounded-b-lg border border-t-0 border-slate-200 mb-8">
            <p class="mb-4">Напишіть SQL-запит, щоб знайти номер рахунку отримувача.</p>
            <div class="terminal-bg rounded-lg border border-slate-700 overflow-hidden shadow-inner mb-4">
                <textarea id="sql-input" rows="4" class="w-full bg-transparent terminal-text p-4 focus:outline-none resize-none font-mono" placeholder="SELECT account_to FROM transactions..."></textarea>
            </div>
            <div class="flex justify-end"><button onclick="executeFinalQuery()" class="bg-red-600 text-white font-bold py-3 px-8 rounded shadow-md">Виконати Запит</button></div>
            <div id="final-success" class="hidden mt-8 p-6 bg-green-50 border border-green-200 rounded-lg text-center">
                <h3 class="text-2xl font-bold text-green-800 mb-2">Місія виконана!</h3>
                <p class="text-green-700">Рахунок хакера заблоковано. Ти справжній SQL Детектив!</p>
            </div>
            <div id="final-error" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-md font-mono">> Помилка синтаксису або неправильна логіка.</div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
