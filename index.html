<!doctype html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Детектив SQL: Секретний брифінг</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden flex flex-col md:flex-row">
    <nav class="bg-white w-full md:w-64 border-r border-slate-200 flex-shrink-0 flex flex-col h-auto md:h-full z-10 shadow-sm">
        <div class="p-4 border-b border-slate-200 bg-slate-100 flex items-center gap-2">
            <span class="text-2xl">&#128187;</span>
            <h1 class="font-bold text-lg leading-tight text-slate-800">Детектив SQL<br /><span class="text-sm font-normal text-slate-500">Пошук зниклих даних</span></h1>
        </div>
        <div class="flex flex-row md:flex-col overflow-x-auto md:overflow-y-auto p-2 gap-1" id="nav-menu">
            <button onclick="window.location.href='index.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm text-slate-600 hover:bg-slate-100 transition-colors whitespace-nowrap md:whitespace-normal">&#127968; Секретний брифінг</button>
            <button onclick="window.location.href='roles.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm text-slate-600 hover:bg-slate-100 transition-colors whitespace-nowrap md:whitespace-normal">&#128100; Твоє досьє</button>
            <button onclick="window.location.href='tasks.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm text-slate-600 hover:bg-slate-100 transition-colors whitespace-nowrap md:whitespace-normal">&#128203; План розслідування</button>
            <button onclick="window.location.href='criteria.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm text-slate-600 hover:bg-slate-100 transition-colors whitespace-nowrap md:whitespace-normal">&#127942; Оцінювання</button>
            <button onclick="window.location.href='sources.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm text-slate-600 hover:bg-slate-100 transition-colors whitespace-nowrap md:whitespace-normal">&#128218; Джерела</button>
            <div class="mt-2 md:mt-4 mb-2 border-t border-slate-200 pt-2 px-2 text-xs font-bold text-slate-400 uppercase tracking-wider hidden md:block">Місії</div>
            <button onclick="window.location.href='stage1.html'" class="nav-link text-left px-4 py-3 rounded-md text-sm text-slate-600 hover:bg-slate-100 transition-colors whitespace-nowrap md:whitespace-normal">&#128275; Етап 1: Метадані</button>
            <button id="nav-stage2" class="nav-link text-left px-4 py-3 rounded-md text-sm text-slate-400 opacity-50 cursor-not-allowed whitespace-nowrap md:whitespace-normal" disabled>&#128274; Етап 2: Логіка</button>
            <button id="nav-stage3" class="nav-link text-left px-4 py-3 rounded-md text-sm text-slate-400 opacity-50 cursor-not-allowed whitespace-nowrap md:whitespace-normal" disabled>&#128274; Етап 3: Фінал</button>
        </div>
    </nav>
    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative scroll-smooth">
        <section id="intro" class="max-w-4xl mx-auto block">
            <div class="bg-red-50 border border-red-200 rounded-lg p-6 mb-8 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl">&#9888;</div>
                <h2 class="text-2xl font-bold text-red-700 mb-2">КРИТИЧНЕ ОПОВІЩЕННЯ</h2>
                <p class="text-red-600 font-mono text-sm mb-4">СИСТЕМА БЕЗПЕКИ КОМПРОМЕТОВАНА</p>
                <div class="prose prose-slate max-w-none text-slate-700">
                    <p>Увага! Сьогодні о <strong>03:00</strong> база даних «GlobalFinance Bank» зазнала атаки...</p>
                    <p>Нам потрібна людина, яка розуміє мову баз даних. Час пішов. <strong>Чи готові ви взятися за цю справу?</strong></p>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 mb-8">
                <h3 class="text-lg font-bold mb-4 text-slate-800 text-center">Оцінка фінансового ризику</h3>
                <div class="chart-container"><canvas id="fundsChart"></canvas></div>
                <div class="text-center mt-4">
                    <button onclick="window.location.href='roles.html'" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition-colors shadow-md">Ознайомитись з Досьє &#10148;</button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const ctx = document.getElementById("fundsChart").getContext("2d");
            new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: ["Вкрадені кошти", "Заблоковані активи"],
                    datasets: [{
                        data: [1200500, 3800000],
                        backgroundColor: ["#dc2626", "#94a3b8"],
                        borderWidth: 0,
                    }],
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: "75%" }
            });
        });
    </script>
</body>
</html>
